version: 2
updates:
  - package-ecosystem: "bun"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: "bun"
    directory: "/apps/api"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps-api)"

  - package-ecosystem: "bun"
    directory: "/apps/web"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps-web)"

  - package-ecosystem: "bun"
    directory: "/packages/shared"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps-shared)"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "chore(deps-actions)"
